services:
  weaviate:
    image: ${IMAGE_WEAVIATE:-semitechnologies/weaviate:1.31.0}
    restart: always
    ports:
      - "${PORT_WEAVIATE:-35003}:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "weaviate"
      ASYNC_INDEXING: "true"
      AUTHENTICATION_APIKEY_ENABLED: "false"
    volumes:
      - ${COSTRICT_DATA_DIR}/data/weaviate/data:/var/lib/weaviate
    networks:
      - shenma