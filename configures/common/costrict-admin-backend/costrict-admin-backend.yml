services:
  costrict-admin-backend:
    image: ${IMAGE_COSTRICT_ADMIN}
    command: ["serve", "--console"]
    restart: always
    privileged: true
    pid: host
    volumes:
      - ./costrict-admin.yaml:/app/costrict-admin.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/costrict:/usr/local/costrict
      - ${COSTRICT_DATA_DIR}:${COSTRICT_DATA_DIR}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
    networks:
      - shenma